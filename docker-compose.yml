version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: customs_dw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: customs_dw
      POSTGRES_USER: customs
      POSTGRES_PASSWORD: customs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customs -d customs_dw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
